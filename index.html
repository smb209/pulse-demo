<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pulse — interactive particle playground</title>
<style>
  :root {
    --bg: #181B1B;
    --surface: rgba(34, 37, 38, 0.72);
    --surface-2: #2B3031;
    --border: #3A4041;
    --text: #F1F3F3;
    --text-muted: #A0AAAB;
    --primary: #44D4E4;
    --primary-hover: #67DCE9;
    --secondary: #DA4E86;
    --accent: #EEA02B;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; display: block; }

  header {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 18px;
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: 0.16em;
    background: linear-gradient(100deg, var(--primary) 10%, var(--secondary) 55%, var(--accent) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 14px rgba(68, 212, 228, 0.35));
  }
  header p {
    font-size: clamp(0.7rem, 2vw, 0.82rem);
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  #stats {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: 18px;
    z-index: 10;
    display: flex;
    gap: 10px;
    user-select: none;
    pointer-events: none;
  }
  .stat {
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    min-width: 62px;
  }
  .stat b {
    display: block;
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    color: var(--primary);
  }
  .stat span {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  #panel {
    position: fixed;
    z-index: 10;
    background: var(--surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
  }
  /* Desktop: left sidebar */
  @media (min-width: 721px) {
    #panel {
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 240px;
    }
  }
  /* Mobile: bottom sheet */
  @media (max-width: 720px) {
    #panel {
      left: 10px;
      right: 10px;
      bottom: max(10px, env(safe-area-inset-bottom));
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }
    #panel .group { flex: 1 1 45%; min-width: 140px; }
    #panel .modes { flex: 1 1 100%; }
  }

  .group label {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .group label output { color: var(--primary); font-weight: 600; }

  input[type="range"] {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--surface-2);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(68, 212, 228, 0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(68, 212, 228, 0.6);
  }

  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .modes button {
    padding: 9px 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .modes button:hover { color: var(--text); border-color: var(--primary); }
  .modes button.active {
    color: var(--bg);
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 16px rgba(68, 212, 228, 0.5);
  }
  #burstBtn {
    padding: 11px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(100deg, var(--secondary), var(--accent));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(218, 78, 134, 0.45);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  #burstBtn:hover { box-shadow: 0 0 26px rgba(218, 78, 134, 0.7); }
  #burstBtn:active { transform: scale(0.96); }
  @media (max-width: 720px) {
    #burstBtn { flex: 1 1 100%; }
  }

  #hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    right: 18px;
    z-index: 10;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    user-select: none;
    pointer-events: none;
  }
  @media (max-width: 720px) { #hint { display: none; } }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <h1>PULSE</h1>
  <p>interactive particle field</p>
</header>

<div id="stats">
  <div class="stat"><b id="fps">—</b><span>fps</span></div>
  <div class="stat"><b id="count">—</b><span>orbs</span></div>
</div>

<div id="panel">
  <div class="group modes" id="modes">
    <button data-mode="attract" class="active">Attract</button>
    <button data-mode="repel">Repel</button>
    <button data-mode="vortex">Vortex</button>
  </div>
  <div class="group">
    <label>Density <output id="densityOut">160</output></label>
    <input type="range" id="density" min="40" max="400" value="160" step="10">
  </div>
  <div class="group">
    <label>Link range <output id="linkOut">110</output></label>
    <input type="range" id="link" min="0" max="200" value="110" step="10">
  </div>
  <button id="burstBtn">✦ Burst</button>
</div>

<div id="hint">move your cursor · click to burst</div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const fpsEl = document.getElementById('fps');
  const countEl = document.getElementById('count');

  const PALETTE = ['#44D4E4', '#DA4E86', '#EEA02B'];
  let W, H, dpr;
  let particles = [];
  let mode = 'attract';
  let target = 160;
  let linkDist = 110;
  const pointer = { x: null, y: null, active: false };

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function spawn(x, y, hot) {
    const a = Math.random() * Math.PI * 2;
    const s = hot ? 2 + Math.random() * 5 : 0.2 + Math.random() * 0.6;
    return {
      x: x ?? Math.random() * W,
      y: y ?? Math.random() * H,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      r: 1.2 + Math.random() * 2.4,
      c: PALETTE[(Math.random() * PALETTE.length) | 0],
      life: hot ? 1 : Infinity,
    };
  }

  function settle() {
    while (particles.length < target) particles.push(spawn());
    // trim only the calm (non-burst) surplus
    if (particles.length > target) {
      let extra = particles.length - target;
      particles = particles.filter(p => {
        if (extra > 0 && p.life === Infinity) { extra--; return false; }
        return true;
      });
    }
  }
  settle();

  function burst(x, y) {
    const cx = x ?? W / 2, cy = y ?? H / 2;
    for (let i = 0; i < 60; i++) particles.push(spawn(cx, cy, true));
  }

  // --- input -----------------------------------------------------------
  function setPointer(e) {
    const t = e.touches ? e.touches[0] : e;
    pointer.x = t.clientX;
    pointer.y = t.clientY;
    pointer.active = true;
  }
  window.addEventListener('pointermove', setPointer);
  window.addEventListener('pointerdown', e => {
    if (e.target.closest('#panel')) return;
    setPointer(e);
    burst(pointer.x, pointer.y);
  });
  window.addEventListener('pointerleave', () => { pointer.active = false; });
  window.addEventListener('touchmove', e => {
    if (!e.target.closest('#panel')) e.preventDefault();
    setPointer(e);
  }, { passive: false });
  window.addEventListener('touchend', () => { pointer.active = false; });

  // --- controls --------------------------------------------------------
  document.getElementById('modes').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    mode = btn.dataset.mode;
    document.querySelectorAll('#modes button').forEach(b => b.classList.toggle('active', b === btn));
  });
  const densityIn = document.getElementById('density');
  const linkIn = document.getElementById('link');
  densityIn.addEventListener('input', () => {
    target = +densityIn.value;
    document.getElementById('densityOut').textContent = target;
    settle();
  });
  linkIn.addEventListener('input', () => {
    linkDist = +linkIn.value;
    document.getElementById('linkOut').textContent = linkDist;
  });
  document.getElementById('burstBtn').addEventListener('click', () => burst());

  // --- physics + render --------------------------------------------------
  let last = performance.now(), frames = 0, fpsTimer = last;

  function step(now) {
    const dt = Math.min((now - last) / 16.67, 3);
    last = now;

    ctx.fillStyle = 'rgba(24, 27, 27, 0.28)';
    ctx.fillRect(0, 0, W, H);

    const FORCE = 0.9, RANGE = 190;

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      if (pointer.active && pointer.x !== null) {
        const dx = pointer.x - p.x, dy = pointer.y - p.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < RANGE * RANGE && d2 > 1) {
          const d = Math.sqrt(d2);
          const f = (1 - d / RANGE) * FORCE * dt;
          if (mode === 'attract') { p.vx += (dx / d) * f; p.vy += (dy / d) * f; }
          else if (mode === 'repel') { p.vx -= (dx / d) * f * 1.6; p.vy -= (dy / d) * f * 1.6; }
          else { p.vx += (-dy / d) * f * 1.8 + (dx / d) * f * 0.25; p.vy += (dx / d) * f * 1.8 + (dy / d) * f * 0.25; }
        }
      }

      p.vx *= 0.985; p.vy *= 0.985;
      // gentle drift so the field never goes static
      p.vx += (Math.random() - 0.5) * 0.02;
      p.vy += (Math.random() - 0.5) * 0.02;
      p.x += p.vx * dt; p.y += p.vy * dt;

      if (p.x < 0) { p.x = 0; p.vx *= -1; }
      if (p.x > W) { p.x = W; p.vx *= -1; }
      if (p.y < 0) { p.y = 0; p.vy *= -1; }
      if (p.y > H) { p.y = H; p.vy *= -1; }

      if (p.life !== Infinity) {
        p.life -= 0.008 * dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
      }
    }

    // links
    if (linkDist > 0) {
      ctx.lineWidth = 1;
      const ld2 = linkDist * linkDist;
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const b = particles[j];
          const dx = a.x - b.x; if (dx > linkDist || dx < -linkDist) continue;
          const dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < ld2) {
            ctx.globalAlpha = (1 - d2 / ld2) * 0.35;
            ctx.strokeStyle = a.c;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    // orbs
    for (const p of particles) {
      const alpha = p.life === Infinity ? 1 : Math.min(p.life * 2, 1);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.c;
      ctx.shadowBlur = 8;
      ctx.shadowColor = p.c;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    frames++;
    if (now - fpsTimer >= 500) {
      fpsEl.textContent = Math.round(frames * 1000 / (now - fpsTimer));
      countEl.textContent = particles.length;
      frames = 0;
      fpsTimer = now;
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
