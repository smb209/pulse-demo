<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pulse — elemental bonding playground</title>
<style>
  :root {
    --bg: #181B1B;
    --surface: rgba(34, 37, 38, 0.72);
    --surface-2: #2B3031;
    --border: #3A4041;
    --text: #F1F3F3;
    --text-muted: #A0AAAB;
    --primary: #44D4E4;
    --primary-hover: #67DCE9;
    --secondary: #DA4E86;
    --accent: #EEA02B;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; display: block; }

  header {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 18px;
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: 0.16em;
    background: linear-gradient(100deg, var(--primary) 10%, var(--secondary) 55%, var(--accent) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 14px rgba(68, 212, 228, 0.35));
  }
  header p {
    font-size: clamp(0.7rem, 2vw, 0.82rem);
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  #stats {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: 18px;
    z-index: 10;
    display: flex;
    gap: 10px;
    user-select: none;
    pointer-events: none;
  }
  .stat {
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    min-width: 62px;
  }
  .stat b {
    display: block;
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    color: var(--primary);
  }
  .stat span {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .stat.flash { animation: capflash 0.5s ease; }

  #ticker {
    position: fixed;
    top: calc(max(14px, env(safe-area-inset-top)) + 58px);
    right: 18px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.74rem;
    user-select: none;
    pointer-events: none;
  }
  #ticker b { color: var(--accent); font-weight: 700; }
  #ticker span { color: var(--text-muted); font-size: 0.66rem; }
  #ticker em { color: var(--border); font-style: normal; }
  #ticker.empty { color: var(--text-muted); font-size: 0.66rem; letter-spacing: 0.06em; }
  @keyframes capflash {
    0%, 100% { border-color: var(--border); }
    30% { border-color: var(--secondary); box-shadow: 0 0 14px rgba(218, 78, 134, 0.6); }
  }

  #panel {
    position: fixed;
    z-index: 10;
    background: var(--surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
  }
  @media (min-width: 721px) {
    #panel {
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 240px;
    }
  }
  @media (max-width: 720px) {
    #panel {
      left: 10px;
      right: 10px;
      bottom: max(10px, env(safe-area-inset-bottom));
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }
    #panel .group { flex: 1 1 45%; min-width: 140px; }
    #panel .modes { flex: 1 1 100%; }
  }

  .group label {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .group label output { color: var(--primary); font-weight: 600; }

  input[type="range"] {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--surface-2);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(68, 212, 228, 0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(68, 212, 228, 0.6);
  }

  .presets {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
    gap: 6px;
    margin-bottom: 8px;
  }
  .presets button {
    padding: 8px 2px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .presets button:hover { color: var(--text); border-color: var(--secondary); }
  .presets button.active {
    color: var(--bg);
    background: var(--secondary);
    border-color: var(--secondary);
    box-shadow: 0 0 14px rgba(218, 78, 134, 0.5);
  }
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  #legend .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.63rem;
    font-variant-numeric: tabular-nums;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 8px;
    user-select: none;
  }
  #legend .chip i {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 5px rgba(255, 255, 255, 0.25);
  }
  @media (max-width: 720px) {
    #panel .presets-wrap { flex: 1 1 100%; }
  }

  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .modes button {
    padding: 9px 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .modes button:hover { color: var(--text); border-color: var(--primary); }
  .modes button.active {
    color: var(--bg);
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 16px rgba(68, 212, 228, 0.5);
  }
  #burstBtn {
    padding: 11px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(100deg, var(--secondary), var(--accent));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(218, 78, 134, 0.45);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  #burstBtn:hover { box-shadow: 0 0 26px rgba(218, 78, 134, 0.7); }
  #burstBtn:active { transform: scale(0.96); }
  @media (max-width: 720px) {
    #burstBtn { flex: 1 1 100%; }
  }

  #hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    right: 18px;
    z-index: 10;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    user-select: none;
    pointer-events: none;
  }
  @media (max-width: 720px) { #hint { display: none; } }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <h1>PULSE</h1>
  <p>elemental bonding playground</p>
</header>

<div id="stats">
  <div class="stat"><b id="fps">—</b><span>fps</span></div>
  <div class="stat"><b id="atoms">—</b><span>atoms</span></div>
  <div class="stat"><b id="bonds">—</b><span>bonds</span></div>
</div>

<div id="ticker" class="empty">no molecules yet</div>

<div id="panel">
  <div class="group presets-wrap">
    <label>Field · <span id="legendTitle"></span></label>
    <div class="presets" id="presets">
      <button data-preset="atmosphere" class="active" title="Earth's atmosphere">Air</button>
      <button data-preset="sun" title="The Sun">Sun</button>
      <button data-preset="earth" title="Bulk Earth">Earth</button>
      <button data-preset="body" title="Human body">Body</button>
      <button data-preset="seawater" title="Seawater">Sea</button>
    </div>
    <div id="legend"></div>
  </div>
  <div class="group modes" id="modes">
    <button data-mode="attract" class="active">Attract</button>
    <button data-mode="repel">Repel</button>
    <button data-mode="vortex">Vortex</button>
  </div>
  <div class="group">
    <label>Max atoms <output id="capOut">250</output></label>
    <input type="range" id="cap" autocomplete="off" min="50" max="500" value="250" step="10">
  </div>
  <div class="group">
    <label>Temperature <output id="tempOut">40</output></label>
    <input type="range" id="temp" autocomplete="off" min="5" max="100" value="40" step="5">
  </div>
  <button id="burstBtn">✦ Burst</button>
</div>

<div id="hint">move your cursor · click to burst</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
