<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pulse — elemental bonding playground</title>
<style>
  :root {
    --bg: #181B1B;
    --surface: rgba(34, 37, 38, 0.72);
    --surface-2: #2B3031;
    --border: #3A4041;
    --text: #F1F3F3;
    --text-muted: #A0AAAB;
    --primary: #44D4E4;
    --primary-hover: #67DCE9;
    --secondary: #DA4E86;
    --accent: #EEA02B;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none; /* stop iOS long-press text selection / callout */
  }
  #stage { position: fixed; inset: 0; display: block; }

  header {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 18px;
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: 0.16em;
    background: linear-gradient(100deg, var(--primary) 10%, var(--secondary) 55%, var(--accent) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 14px rgba(68, 212, 228, 0.35));
  }
  header p {
    font-size: clamp(0.7rem, 2vw, 0.82rem);
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  #stats {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: 18px;
    z-index: 10;
    display: flex;
    gap: 10px;
    user-select: none;
    pointer-events: none;
  }
  .stat {
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    min-width: 62px;
  }
  .stat b {
    display: block;
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    color: var(--primary);
  }
  .stat span {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .stat.flash { animation: capflash 0.5s ease; }

  #ticker {
    position: fixed;
    top: calc(max(14px, env(safe-area-inset-top)) + 58px);
    right: 18px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.74rem;
    user-select: none;
    cursor: pointer;
  }
  #ticker:hover { border-color: var(--primary); }
  #ticker::after {
    content: '▾';
    color: var(--text-muted);
    font-size: 0.6rem;
    margin-left: 2px;
  }
  #ticker.open::after { content: '▴'; }

  #molechart {
    position: fixed;
    top: calc(max(14px, env(safe-area-inset-top)) + 96px);
    right: 18px;
    z-index: 10;
    width: 250px;
    background: var(--surface);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    user-select: none;
  }
  #molechart .mc-head {
    display: flex;
    justify-content: space-between;
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  #molechart .mc-row {
    display: grid;
    grid-template-columns: 56px 1fr 44px;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  #molechart .mc-label {
    font-size: 0.74rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #molechart .mc-track {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }
  #molechart .mc-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 0 3px 3px 0;
    transition: width 0.3s ease;
  }
  #molechart .mc-val {
    font-size: 0.68rem;
    font-variant-numeric: tabular-nums;
    color: var(--text-muted);
    text-align: right;
  }
  #molechart .mc-empty {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: center;
    padding: 8px 0;
  }
  @media (max-width: 720px) {
    #molechart { width: min(250px, calc(100vw - 36px)); }
  }
  #ticker b { color: var(--accent); font-weight: 700; }
  #ticker span { color: var(--text-muted); font-size: 0.66rem; }
  #ticker em { color: var(--border); font-style: normal; }
  #ticker.empty { color: var(--text-muted); font-size: 0.66rem; letter-spacing: 0.06em; }
  @keyframes capflash {
    0%, 100% { border-color: var(--border); }
    30% { border-color: var(--secondary); box-shadow: 0 0 14px rgba(218, 78, 134, 0.6); }
  }

  #panel {
    position: fixed;
    z-index: 10;
    background: var(--surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
  }
  @media (min-width: 721px) {
    #panel {
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 240px;
    }
  }
  @media (max-width: 720px) {
    #panel {
      left: 10px;
      right: 10px;
      bottom: max(10px, env(safe-area-inset-bottom));
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }
    #panel .group { flex: 1 1 45%; min-width: 140px; }
    #panel .modes { flex: 1 1 100%; }
  }

  /* Collapsible controls — reclaim screen space (esp. on mobile) */
  .panel-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
    padding: 9px 12px;
    font-size: 0.66rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: color 0.18s ease, border-color 0.18s ease;
  }
  .panel-toggle:hover { color: var(--text); border-color: var(--primary); }
  .panel-toggle .pt-chev { font-size: 0.62rem; transition: transform 0.2s ease; }
  #panel.collapsed .panel-toggle .pt-chev { transform: rotate(180deg); }
  #panel.collapsed { gap: 0; }
  #panel.collapsed > :not(.panel-toggle) { display: none; }

  /* gas-physics + readout toggles */
  .toggles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .toggles button {
    padding: 8px 2px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .toggles button:hover { color: var(--text); border-color: var(--accent); }
  .toggles button.active {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(238, 160, 43, 0.5);
  }

  /* gas-readout HUD (left, under the header) */
  #gasHUD {
    position: fixed;
    left: 18px;
    top: calc(max(14px, env(safe-area-inset-top)) + 74px);
    z-index: 9;
    width: 210px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--surface);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    user-select: none;
    pointer-events: none;
  }
  #gasHUD .hud-sec { display: flex; flex-direction: column; gap: 6px; }
  #gasHUD .hud-sec[hidden] { display: none; } /* desktop flag-driven hiding (beats .hud-sec) */
  #gasHUD .hud-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }
  #gasHUD .hud-row { display: flex; justify-content: space-between; font-size: 0.74rem; font-variant-numeric: tabular-nums; }
  #gasHUD .hud-row span { color: var(--text-muted); }
  #gasHUD .hud-row b { color: var(--primary); font-weight: 600; }
  #gasHUD .hud-row b.warn { color: var(--accent); }
  #histBars { display: flex; align-items: flex-end; gap: 2px; height: 46px; }
  #histBars i { flex: 1; background: var(--primary); border-radius: 2px 2px 0 0; min-height: 1px; transition: height 0.25s ease; }
  #histMeta { font-size: 0.58rem; color: var(--text-muted); letter-spacing: 0.04em; }
  /* The readout HUD and the molecule chart share the right edge on desktop (and can't fit
     side by side on a phone), so they never show at once — while the chart is open the HUD
     steps aside, no overlap. */
  body.chart-open #gasHUD { display: none; }
  /* Desktop: the control panel owns the left edge, so the readout HUD lives on the right.
     Mobile: the panel is docked to the bottom, so the HUD stays top-left. */
  @media (min-width: 721px) {
    #gasHUD { left: auto; right: 18px; top: calc(max(14px, env(safe-area-inset-top)) + 150px); }
  }
  @media (max-width: 720px) {
    #gasHUD { width: min(168px, calc(100vw - 36px)); gap: 9px; padding: 11px 12px; }
    /* declutter the top: the subtitle was colliding with the stat chips */
    header p { display: none; }
  }

  .group label {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .group label output { color: var(--primary); font-weight: 600; }

  input[type="range"] {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--surface-2);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(68, 212, 228, 0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(68, 212, 228, 0.6);
  }

  .presets {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
    gap: 6px;
    margin-bottom: 8px;
  }
  .presets button {
    padding: 8px 2px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .presets button:hover { color: var(--text); border-color: var(--secondary); }
  .presets button.active {
    color: var(--bg);
    background: var(--secondary);
    border-color: var(--secondary);
    box-shadow: 0 0 14px rgba(218, 78, 134, 0.5);
  }
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  #legend .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.63rem;
    font-variant-numeric: tabular-nums;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 8px;
    user-select: none;
  }
  #legend .chip i {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 5px rgba(255, 255, 255, 0.25);
  }
  @media (max-width: 720px) {
    #panel .presets-wrap { flex: 1 1 100%; }
    #panel .inject-wrap { flex: 1 1 100%; }
    #panel .physics-wrap { flex: 1 1 100%; }
    #panel .btnrow { flex: 1 1 100%; }
  }

  .inject {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 5px;
  }
  .inject button {
    padding: 7px 2px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .inject button:hover { color: var(--text); border-color: var(--accent); }
  .inject button.active {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(238, 160, 43, 0.5);
  }

  .btnrow { display: flex; gap: 8px; }
  .btnrow #burstBtn { flex: 2; }
  #resetBtn {
    flex: 1;
    padding: 11px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #resetBtn:hover { color: var(--text); border-color: var(--primary); }
  #resetBtn:active { transform: scale(0.96); }

  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .modes button {
    padding: 9px 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .modes button:hover { color: var(--text); border-color: var(--primary); }
  .modes button.active {
    color: var(--bg);
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 16px rgba(68, 212, 228, 0.5);
  }
  #burstBtn {
    padding: 11px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(100deg, var(--secondary), var(--accent));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(218, 78, 134, 0.45);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  #burstBtn:hover { box-shadow: 0 0 26px rgba(218, 78, 134, 0.7); }
  #burstBtn:active { transform: scale(0.96); }
  @media (max-width: 720px) {
    #burstBtn { flex: 1 1 100%; }
  }

  #hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    right: 18px;
    z-index: 10;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    user-select: none;
    pointer-events: none;
  }
  @media (max-width: 720px) { #hint { display: none; } }

  /* Readout cycler pill — mobile only. Steps through one readout at a time. */
  #viewCycle {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: 18px;
    z-index: 11;
    display: none; /* revealed on mobile */
    align-items: center;
    gap: 8px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 15px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #viewCycle:active { transform: scale(0.96); }
  #viewCycle .vc-arrow { color: var(--primary); font-size: 0.68rem; }
  #viewCycle.off { color: var(--text-muted); }
  #viewCycle.off .vc-arrow { color: var(--text-muted); }

  @media (max-width: 720px) {
    #viewCycle { display: inline-flex; }
    /* the cycler owns readouts: hide them all, hide the display-only physics toggles */
    #stats, #ticker, #molechart, #gasHUD { display: none; }
    #physics [data-flag="pressure"],
    #physics [data-flag="speeds"],
    #physics [data-flag="tracer"] { display: none; }
    /* readouts dock to a single consistent top-left zone */
    #stats { left: 10px; right: auto; top: calc(max(14px, env(safe-area-inset-top)) + 60px); }
    #molechart { left: 10px; right: auto; top: calc(max(14px, env(safe-area-inset-top)) + 60px); }
    #gasHUD { left: 10px; right: auto; top: calc(max(14px, env(safe-area-inset-top)) + 60px); }
    /* reveal only the active view */
    body[data-view="stats"] #stats { display: flex; }
    body[data-view="molecules"] #molechart { display: block; }
    body[data-view="gas"] #gasHUD,
    body[data-view="speeds"] #gasHUD,
    body[data-view="diffusion"] #gasHUD { display: flex; }
    body[data-view="gas"] #hudSpeeds, body[data-view="gas"] #hudTracer,
    body[data-view="speeds"] #hudGas, body[data-view="speeds"] #hudTracer,
    body[data-view="diffusion"] #hudGas, body[data-view="diffusion"] #hudSpeeds { display: none; }
    body[data-view="gas"] #hudGas,
    body[data-view="speeds"] #hudSpeeds,
    body[data-view="diffusion"] #hudTracer { display: flex; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <h1>PULSE</h1>
  <p>elemental bonding playground</p>
</header>

<div id="stats">
  <div class="stat"><b id="fps">—</b><span>fps</span></div>
  <div class="stat"><b id="atoms">—</b><span>atoms</span></div>
  <div class="stat"><b id="bonds">—</b><span>bonds</span></div>
</div>

<button id="viewCycle" type="button" title="Tap to cycle the on-screen readout">
  <span id="viewCycleLabel">Stats</span>
  <span class="vc-arrow" aria-hidden="true">▸</span>
</button>

<div id="ticker" class="empty" title="Click for the molecule breakdown">no molecules yet</div>

<div id="molechart" hidden>
  <div class="mc-head"><span>Molecule mix</span><span id="mcTotal"></span></div>
  <div id="mcRows"></div>
</div>

<div id="panel">
  <button id="panelToggle" class="panel-toggle" type="button" aria-controls="panel" aria-expanded="true" title="Collapse controls">
    <span>Controls</span>
    <span class="pt-chev" aria-hidden="true">▾</span>
  </button>
  <div class="group presets-wrap">
    <label>Field · <span id="legendTitle"></span></label>
    <div class="presets" id="presets">
      <button data-preset="atmosphere" class="active" title="Earth's atmosphere">Air</button>
      <button data-preset="sun" title="The Sun">Sun</button>
      <button data-preset="earth" title="Bulk Earth">Earth</button>
      <button data-preset="body" title="Human body">Body</button>
      <button data-preset="seawater" title="Seawater">Sea</button>
      <button data-preset="salt" title="Salt flats — ionic bonding demo">Salt</button>
      <button data-preset="burn" title="Combustion chamber — exothermic chains">Burn</button>
      <button data-preset="soup" title="Primordial soup — organics assembly">Soup</button>
    </div>
    <div id="legend"></div>
  </div>
  <div class="group modes" id="modes">
    <button data-mode="attract" class="active">Attract</button>
    <button data-mode="repel">Repel</button>
    <button data-mode="vortex">Vortex</button>
  </div>
  <div class="group inject-wrap">
    <label>Click injects</label>
    <div class="inject" id="inject">
      <button data-inject="mix" class="active" title="Preset-weighted mix">Mix</button>
      <button data-inject="O" title="Oxygen">O</button>
      <button data-inject="H" title="Hydrogen">H</button>
      <button data-inject="C" title="Carbon">C</button>
      <button data-inject="N" title="Nitrogen">N</button>
      <button data-inject="Na" title="Sodium">Na</button>
      <button data-inject="Cl" title="Chlorine">Cl</button>
      <button data-inject="Fe" title="Iron">Fe</button>
    </div>
  </div>
  <div class="group physics-wrap">
    <label>Gas physics</label>
    <div class="toggles" id="physics">
      <button data-flag="collisions" title="Excluded volume — atoms collide and bounce instead of overlapping">Collide</button>
      <button data-flag="thermostat" title="Drive the measured temperature to the slider setpoint">Thermo</button>
      <button data-flag="gravity" title="Downward pull — heavier gas settles lower (barometric)">Gravity</button>
      <button data-flag="pressure" title="Measure pressure and PV = N·kT compressibility (Z)">Pressure</button>
      <button data-flag="speeds" title="Maxwell–Boltzmann speed histogram">Speeds</button>
      <button data-flag="tracer" title="Tag lightest vs heaviest species — diffusion / Graham's law">Tracer</button>
    </div>
  </div>
  <div class="group">
    <label>Max atoms <output id="capOut">250</output></label>
    <input type="range" id="cap" autocomplete="off" min="50" max="500" value="250" step="10">
  </div>
  <div class="group">
    <label>Temperature <output id="tempOut">40</output></label>
    <input type="range" id="temp" autocomplete="off" min="5" max="100" value="40" step="5">
  </div>
  <div class="btnrow">
    <button id="burstBtn" title="Break every bond — fragments ejected with the bond energy">✦ Burst</button>
    <button id="resetBtn" title="Cap 250 · Temp 40 · Attract · Mix · respawn">⟲ Reset</button>
  </div>
</div>

<div id="gasHUD" hidden>
  <div class="hud-sec" id="hudGas" hidden>
    <div class="hud-title">Gas state · PV = N·kT</div>
    <div class="hud-row"><span>Temp (kT)</span><b id="hudT">—</b></div>
    <div class="hud-row"><span>Pressure</span><b id="hudP">—</b></div>
    <div class="hud-row"><span>Atoms (N)</span><b id="hudN">—</b></div>
    <div class="hud-row" title="PV / N·kT compressibility — 1 = ideal gas, <1 attraction wins, >1 excluded volume wins"><span>Z = PV/NkT</span><b id="hudZ">—</b></div>
  </div>
  <div class="hud-sec" id="hudSpeeds" hidden>
    <div class="hud-title">Speed distribution</div>
    <div id="histBars"></div>
    <div id="histMeta">Maxwell–Boltzmann</div>
  </div>
  <div class="hud-sec" id="hudTracer" hidden>
    <div class="hud-title">Diffusion · Graham's law</div>
    <div class="hud-row"><span id="tracerLight">light</span><b id="tracerLightV">—</b></div>
    <div class="hud-row"><span id="tracerHeavy">heavy</span><b id="tracerHeavyV">—</b></div>
    <div class="hud-row" title="Measured mean-speed ratio vs Graham's √(m_heavy / m_light) prediction"><span>ratio / √m</span><b id="tracerRatio">—</b></div>
  </div>
</div>

<div id="hint">move your cursor · click injects · burst snaps every bond</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
